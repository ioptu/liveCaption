name: Build Extension

on:
  #push:
    #branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # cache: 'npm'

      - name: Install Deps
        run: npm install

      - name: Download Whisper Base Model
        run: |
          mkdir -p public/models/whisper-base/onnx
          base_url="https://huggingface.co/Xenova/whisper-base/resolve/main"
          # 下载配置文件
          curl -L "$base_url/config.json" -o public/models/whisper-base/config.json
          curl -L "$base_url/tokenizer.json" -o public/models/whisper-base/tokenizer.json
          curl -L "$base_url/tokenizer_config.json" -o public/models/whisper-base/tokenizer_config.json
          curl -L "$base_url/preprocessor_config.json" -o public/models/whisper-base/preprocessor_config.json
          # 下载 ONNX 模型文件 (注意文件名)
          curl -L "$base_url/onnx/encoder_model_quantized.onnx" -o public/models/whisper-base/onnx/encoder_model_quantized.onnx
          curl -L "$base_url/onnx/decoder_model_merged_quantized.onnx" -o public/models/whisper-base/onnx/decoder_model_merged_quantized.onnx
          curl -L "$base_url/generation_config.json" -o public/models/whisper-base/generation_config.json

      - name: Build
        run: npm run build

      # 将 dist 目录打包供下载
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-subtitle-extension-dist
          path: dist/
