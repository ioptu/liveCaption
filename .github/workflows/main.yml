name: Build and Release Whisper Extension

on:
  #push:
    #tags:
     # - 'v*' # 当你推送以 v 开头的标签（如 v2.0.0）时触发
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 1. 创建模型存放目录
      - name: Create Model Directory
        run: |
          mkdir -p models/whisper-base/onnx

      # 2. 从 Hugging Face 下载模型配置文件和量化版 ONNX 文件
      # 我们使用 base.en 或 base (中文建议用 base) 的量化版本
      - name: Download Whisper Base Quantized Model
        run: |
          MODEL_URL="https://huggingface.co/Xenova/whisper-base/resolve/main"
          
          # 下载核心配置文件
          curl -L "$MODEL_URL/config.json" -o models/whisper-base/config.json
          curl -L "$MODEL_URL/tokenizer.json" -o models/whisper-base/tokenizer.json
          curl -L "$MODEL_URL/tokenizer_config.json" -o models/whisper-base/tokenizer_config.json
          curl -L "$MODEL_URL/preprocessor_config.json" -o models/whisper-base/preprocessor_config.json
          curl -L "$MODEL_URL/generation_config.json" -o models/whisper-base/generation_config.json
          
          # 下载 ONNX 量化版模型文件 (必须放在 onnx 目录下)
          curl -L "$MODEL_URL/onnx/encoder_model_quantized.onnx" -o models/whisper-base/onnx/encoder_model_fp16.onnx
          curl -L "$MODEL_URL/onnx/decoder_model_merged_quantized.onnx" -o models/whisper-base/onnx/decoder_model_merged_fp16.onnx
          #curl -L "$MODEL_URL/onnx/encoder_model.onnx" -o models/whisper-base/onnx/encoder_model.onnx
          #curl -L "$MODEL_URL/onnx/decoder_model_merged.onnx" -o models/whisper-base/onnx/decoder_model_merged.onnx          

      # 3. 下载 Transformers.js 库文件 (确保 worker.js 能离线加载)
      - name: Download Transformers.js Library
        run: |
          mkdir -p src/lib
          curl -L "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.8.1/dist/transformers.min.js" -o src/lib/transformers.min.js
          curl -L "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.8.1/dist/ort-wasm-simd-threaded.jsep.wasm" -o src/lib/ort-wasm-simd-threaded.jsep.wasm
          curl -L "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.8.1/dist/ort-wasm-simd-threaded.jsep.mjs" -o src/lib/ort-wasm-simd-threaded.jsep.mjs

      # 4. 打包扩展文件 (排除不必要的文件)
      - name: Zip Extension
        run: |
          zip -r whisper-extension.zip . \
            -x "*.git*" ".github*" "node_modules/*" "package-lock.json" "README.md"

      # 5. 发布到 GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v1
        # 修改这里：如果是手动触发 OR 是推送标签，都执行
        if: |
          github.event_name == 'workflow_dispatch' || 
          startsWith(github.ref, 'refs/tags/')
        with:
          # 手动触发时没有标签名，我们给一个默认名称或使用运行 ID
          tag_name: ${{ github.ref_name }}-${{ github.run_number }}
          name: Release ${{ github.ref_name }} (Build ${{ github.run_number }})
          files: whisper-extension.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
