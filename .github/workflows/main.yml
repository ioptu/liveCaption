name: Build Extension

on:
  #push:
    #branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # cache: 'npm'

      - name: Install Deps
        run: npm install

      # 自动下载模型文件到 public/models/whisper-tiny
      - name: Download Models
        run: |
          mkdir -p public/models/whisper-tiny/onnx
          base_url="https://huggingface.co/Xenova/whisper-tiny/resolve/main"
          
          curl -L "$base_url/config.json" -o public/models/whisper-tiny/config.json
          curl -L "$base_url/tokenizer.json" -o public/models/whisper-tiny/tokenizer.json
          curl -L "$base_url/preprocessor_config.json" -o public/models/whisper-tiny/preprocessor_config.json
          
          # 下载 ONNX 模型 (注意：这里下载的是标准版，如需量化版请改文件名)
          curl -L "$base_url/onnx/encoder_model.onnx" -o public/models/whisper-tiny/onnx/encoder_model.onnx
          curl -L "$base_url/onnx/decoder_model_merged.onnx" -o public/models/whisper-tiny/onnx/decoder_model_merged.onnx

      - name: Build
        run: npm run build

      # 将 dist 目录打包供下载
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-subtitle-extension-dist
          path: dist/
