name: Build transformers-bundle.js
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Create temp-build directory and install dependencies
        run: |
          mkdir temp-build
          cd temp-build
          npm init -y
          npm install @huggingface/transformers@4.0.1 onnxruntime-web esbuild --save-dev
 
      - name: Create entry.js
        run: |
          cd temp-build
          cat > entry.js << 'EOF'
          export * from '@huggingface/transformers';
          import * as ort from 'onnxruntime-web';
          export { ort };
          EOF

      - name: Build with esbuild
        run: |
          cd temp-build
          npx esbuild entry.js \
            --bundle \
            --outfile=transformers-bundle.js \
            --format=esm \
            --target=es2022 \
            --platform=browser \
            --minify

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: transformers-bundle
          path: temp-build/transformers-bundle.js
          retention-days: 30

      - name: Release on tag
        if: false
        uses: softprops/action-gh-release@v2
        with:
          files: temp-build/transformers-bundle.js
