name: Build transformers-bundle.js
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Create temp-build and install
        run: |
          mkdir temp-build
          cd temp-build
          npm init -y
          npm install @huggingface/transformers@4.0.1 onnxruntime-web@latest esbuild --save-dev

      - name: Create improved entry.js
        run: |
          cd temp-build
          cat > entry.js << 'EOF'
          // 导出 transformers 主库
          export * from '@huggingface/transformers';

          // 关键：分开导出 wasm 和 webgpu 版本的 ort（v4 推荐做法）
          import * as ortWasm from 'onnxruntime-web';
          import * as ortWebGPU from 'onnxruntime-web/webgpu';

          export { ortWasm as ort };
          export { ortWebGPU as ortWebGPU };

          // 方便在 offscreen 中根据 device 切换
          export const getOrt = (useWebGPU = false) => useWebGPU ? ortWebGPU : ortWasm;
          EOF

      - name: Build with esbuild (优化配置)
        run: |
          cd temp-build
          npx esbuild entry.js \
            --bundle \
            --outfile=transformers-bundle.js \
            --format=esm \
            --target=es2022 \
            --platform=browser \
            --minify \
            --splitting \
            --outdir=. \
            --external:@huggingface/transformers  # 可选，如果想减小体积


      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: transformers-bundle
          path: temp-build/transformers-bundle.js
          retention-days: 30
