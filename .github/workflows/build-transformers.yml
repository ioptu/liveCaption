name: Build transformers-bundle.js
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Create temp-build and install dependencies
        run: |
          mkdir temp-build
          cd temp-build
          npm init -y
          npm install @huggingface/transformers@4.0.1 onnxruntime-web@latest esbuild --save-dev

      - name: Create entry.js (v4 推荐写法)
        run: |
          cd temp-build
          cat > entry.js << 'EOF'
          // 主库导出（包含 pipeline、env 等）
          export * from '@huggingface/transformers';

          // 分开导出 ort（wasm 用于 VAD，webgpu 用于 Whisper）
          import * as ortWasm from 'onnxruntime-web';
          import * as ortWebGPU from 'onnxruntime-web/webgpu';

          export { ortWasm as ort };
          export { ortWebGPU as ortWebGPU };

          // 工具函数：根据需要切换 ort
          export const getOrt = (useWebGPU = false) => useWebGPU ? ortWebGPU : ortWasm;
          EOF

      - name: Build with esbuild（已修复 outfile/outdir 冲突）
        run: |
          cd temp-build
          npx esbuild entry.js \
            --bundle \
            --outfile=transformers-bundle.js \
            --format=esm \
            --target=es2022 \
            --platform=browser \
            --minify \
            --external:onnxruntime-web/webgpu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: transformers-bundle
          path: temp-build/transformers-bundle.js
          retention-days: 30
