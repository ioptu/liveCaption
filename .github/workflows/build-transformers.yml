name: Build Transformers Bundle
on:
  workflow_dispatch: # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          mkdir build-src && cd build-src
          npm init -y
          npm install @huggingface/transformers@4.0.1 --save-dev

      - name: Create Entry File
        run: |
          cd build-src
          cat > entry.js << 'EOF'
          export { 
            env, 
            pipeline, 
            AutoTokenizer, 
            AudioProcessor, 
            ort 
          } from '@huggingface/transformers';
          EOF

      - name: Bundle with esbuild
        run: |
          cd build-src
          npx esbuild entry.js \
            --bundle \
            --outfile=../dist/transformers-bundle.js \
            --format=esm \
            --target=es2022 \
            --platform=browser \
            --minify-whitespace \
            --minify-syntax \
            --keep-names \
            --define:process.env.NODE_ENV='"production"'

      - name: Extract WASM Assets
        run: |
          # 动态定位 transformers 依赖的 ort 路径
          ORT_DIST=$(find build-src/node_modules -path "*/onnxruntime-web/dist/*" -type d | head -n 1)
          echo "Found ORT Dist at: $ORT_DIST"
          
          # 拷贝所有必要的 WASM 和 MJS 引导文件到 dist 目录
          cp $ORT_DIST/*.wasm ./dist/
          cp $ORT_DIST/*.mjs ./dist/


      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-assets
          path: ./dist/*
