name: Build transformers-bundle.js
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Create temp-build and install
        run: |
          mkdir temp-build
          cd temp-build
          npm init -y
          npm install @huggingface/transformers@4.2 onnxruntime-web@latest esbuild --save-dev

      - name: Create entry.js（简化稳定版）
        run: |
          cd temp-build
          cat > entry.js << 'EOF'
          // 只导出 transformers 主库（v4 内部自动处理 webgpu）
          export * from '@huggingface/transformers';

          // 导出 wasm 版本的 ort（专供 VAD 使用）
          import * as ort from 'onnxruntime-web';
          export { ort };
          EOF

      - name: Build with esbuild（已修复所有冲突）
        run: |
          cd temp-build
          npx esbuild entry.js \
            --bundle \
            --outfile=transformers-bundle.js \
            --format=esm \
            --target=es2022 \
            --platform=browser \
            --minify

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: transformers-bundle
          path: temp-build/transformers-bundle.js
          retention-days: 30
